  <style>
    /* Animaciones */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .animate-float { animation: float 3s infinite ease-in-out; }

    @keyframes packOpen {
      0% { transform: rotateY(0deg) scale(1); filter: brightness(1); }
      50% { transform: rotateY(360deg) scale(1.2); filter: brightness(3); }
      100% { transform: rotateY(720deg) scale(1); filter: brightness(1); }
    }
    .animate-pack-open { animation: packOpen 1.5s ease-in-out forwards; }

    @keyframes scaleIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .animate-scale-in { animation: scaleIn 0.3s ease-out forwards; }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    @keyframes explode {
      0% { transform: translate(0, 0) scale(0); opacity: 1; }
      10% { transform: translate(calc(var(--tx) * 0.1), calc(var(--ty) * 0.1)) scale(1); opacity: 1; }
      80% { opacity: 0.8; transform: translate(calc(var(--tx) * 0.8), calc(var(--ty) * 0.8)) rotate(var(--rot)) scale(0.5); }
      100% { transform: translate(var(--tx), var(--ty)) rotate(calc(var(--rot) * 2)) scale(0); opacity: 0; }
    }
    .confetti-piece { animation: explode var(--dur) ease-out forwards; }

    @keyframes revealBg {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(4); opacity: 0.4; }
      100% { transform: scale(3); opacity: 0; }
    }
    .animate-reveal-bg { animation: revealBg 1.5s ease-out forwards; }
    
    .progress-bar { transition: width 1s ease-in-out; }

    /* Custom Scrollbar for Market Table */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.5); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(6, 182, 212, 0.8); }

    /* Estilo para lista de jugadores en admin */
    .players-list {
      max-width: 200px;
      white-space: normal;
      word-break: break-word;
      line-height: 1.3;
      font-size: 11px;
      cursor: help;
    }
  </style>

    function parseCSVToMarketDB(csvString) {
      const lines = csvString.trim().split('\n');
      const headers = lines[0].split(',');
      return lines.slice(1).map((line, index) => {
        const values = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"') inQuotes = !inQuotes;
          else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
          else current += char;
        }
        values.push(current.trim());
        const cleanValues = values.map(v => v.replace(/^"|"$/g, ''));
        let priceNum = 0;
        if (cleanValues[4]) priceNum = parseInt(cleanValues[4].replace(/,/g, '').replace(/"/g, '')) || 0;
        const ratingNum = parseInt(cleanValues[3]) || 0;
        return {
          id: index + 1,
          name: cleanValues[0] || '',
          team: cleanValues[1] || '',
          pos: cleanValues[2] || '',
          rating: ratingNum,
          price: cleanValues[4] || '0',
          priceNum: priceNum,
          clause: cleanValues[5] || 'No'
        };
      }).sort((a, b) => b.rating - a.rating);
    }

    // --- APERTURA DE SOBRES (con bloqueo global y lista completa de obtenidos)---
    window.openPack = function(packType) {
      if (state.isOpening) return;

      // Obtenemos datos de Firebase (usuarios y globalObtained)
      Promise.all([
        db.ref("users").once("value"),
        db.ref("globalObtained").once("value")
      ]).then(([usersSnap, globalSnap]) => {
        const users = usersSnap.val() || {};
        const userData = users[state.currentUser];
        let globalObtained = globalSnap.val() || []; // array de IDs ya obtenidos globalmente

        if (!userData || userData.tokens[packType] <= 0) {
          alert("No tienes fichas suficientes para este pack.");
          return;
        }

        userData.tokens[packType]--;
        db.ref("users").set(users);
        syncUserData();
        updateState({ isOpening: true });

        setTimeout(() => {
          // Jugadores disponibles: los que el usuario no tiene y que no están en globalObtained
          let available = PLAYERS_DB.filter(p => 
            !state.inventory.includes(p.id) && 
            !globalObtained.includes(p.id)
          );
          
          if (packType === 'ultimate') {
            available = available.filter(p => p.rating >= 84);
          }

          if (available.length === 0) {
            alert("Ya no quedan jugadores nuevos disponibles en este sobre.");
            updateState({ isOpening: false });
            userData.tokens[packType]++;
            db.ref("users").set(users);
            syncUserData();
            return;
          }

          const t1 = available.filter(p => p.rating < 84);
          const t2 = available.filter(p => p.rating >= 84 && p.rating <= 87);
          const t3 = available.filter(p => p.rating >= 88);
          
          let pool = [];
          const rand = Math.random() * 100;

          if (packType === 'normal') {
            if (rand < 5 && t3.length > 0) pool = t3;
            else if (rand < 25 && t2.length > 0) pool = t2;
            else pool = t1.length > 0 ? t1 : available;
          } 
          else if (packType === 'elite') {
            if (rand < 20 && t3.length > 0) pool = t3;
            else if (rand < 60 && t2.length > 0) pool = t2;
            else pool = t1.length > 0 ? t1 : available;
          } 
          else if (packType === 'ultimate') {
            // ✅ PROBABILIDAD BAJADA A 30%
            if (rand < 30 && t3.length > 0) pool = t3;
            else pool = t2.length > 0 ? t2 : available;
          }

          if (pool.length === 0) pool = available;

          const randomPlayer = pool[Math.floor(Math.random() * pool.length)];
          const newInv = [...state.inventory, randomPlayer.id];
          
          userData.inventory = newInv;
          // Actualizar lista de obtenidos del usuario (array)
          const currentObtained = userData.obtainedPlayers || [];
          const newObtained = [...currentObtained, randomPlayer.name];
          userData.obtainedPlayers = newObtained;
          
          // Actualizar globalObtained con el nuevo ID
          globalObtained.push(randomPlayer.id);
          
          // Guardar cambios: usuarios y globalObtained
          db.ref("users").set(users);
          db.ref("globalObtained").set(globalObtained);
          
          updateState({ 
            inventory: newInv,
            revealedPlayer: randomPlayer,
            showReveal: true,
            isOpening: false
          });
        }, 1500);
      });
    };

                       <button onclick="modToken('${name}', 'ultimate', 1)" class="text-[8px] bg-green-500/20 text-green-400 px-1 rounded hover:bg-green-500/50">+</button>
                       <button onclick="modToken('${name}', 'ultimate', -1)" class="text-[8px] bg-red-500/20 text-red-400 px-1 rounded hover:bg-red-500/50">-</button>
                     </div>
                   </div>
                 </div>
                 </td>
              <td class="p-4 text-center">
                <div class="players-list" title="${obtainedList.replace(/"/g, '&quot;')}">${obtainedList.substring(0, 50)}${obtainedList.length > 50 ? '…' : ''}</div>
                </td>
              <td class="p-4 text-center">
                <button onclick="resetCollection('${name}')" class="bg-red-600 hover:bg-red-500 text-white text-[10px] font-bold px-3 py-1.5 rounded uppercase tracking-wider transition-all">
                  Reiniciar
                </button>
                </td>
              </tr>
          `;
        });

        const root = document.getElementById('root');
        root.innerHTML = `
          <div class="w-full py-8 animate-scale-in z-20 relative">
             <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 border-b border-white/10 pb-6">
                <h1 class="text-3xl font-black italic text-cyan-400 flex items-center gap-3">
                  <i data-lucide="shield-alert" class="animate-pulse"></i> PANEL ADMIN
                </h1>
                <button onclick="handleLogout()" class="bg-red-500/10 text-red-400 px-6 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-red-500/20 transition-all">
                  <i data-lucide="log-out" class="w-4 h-4"></i> Salir
                </button>
             </div>
             <div class="bg-black/80 rounded-3xl border border-white/10 overflow-hidden backdrop-blur-md shadow-2xl">
                <div class="overflow-x-auto">
                  <table class="w-full text-left whitespace-nowrap">
                    <thead class="bg-white/5 text-[10px] uppercase tracking-widest text-cyan-400 font-bold">
                       <tr>
                        <th class="p-4">Usuario</th>
                        <th class="p-4 text-center">Normal</th>
                        <th class="p-4 text-center">Elite</th>
                        <th class="p-4 text-center">Ultimate</th>
                        <th class="p-4 text-center">Jugadores Obtenidos</th>
                        <th class="p-4 text-center">Acción</th>
                       </tr>
                    </thead>
                    <tbody class="text-sm">
                      ${tableRows}
                    </tbody>
                   </table>
                </div>
             </div>
          </div>
        `;
        if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
      });
    }

    function renderMenu() {
      return `
        ${renderHeader(false)}
        <div class="flex-grow flex items-center justify-center py-10 z-20 relative animate-scale-in">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
            <button onclick="goToPacks()" class="group relative h-80 rounded-[3rem] overflow-hidden border-2 border-white/10 hover:border-cyan-400 transition-all shadow-2xl hover:shadow-[0_0_50px_rgba(6,182,212,0.4)] hover:-translate-y-2">
              <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110" style="background-image: url('${PACK_BACKGROUND}')"></div>
              <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"></div>
              <div class="absolute inset-0 flex flex-col items-center justify-center p-6">
                <div class="bg-cyan-500/20 p-5 rounded-full backdrop-blur-sm border border-cyan-400/30 group-hover:bg-cyan-500/40 transition-colors mb-4">
                  <i data-lucide="package" class="w-12 h-12 text-cyan-300"></i>
                </div>
                <h2 class="text-4xl font-black italic uppercase tracking-tighter text-white drop-shadow-lg">PACKS</h2>
                <p class="text-[10px] uppercase tracking-[0.3em] text-cyan-300/80 mt-2 font-bold">Abrir Sobres</p>
              </div>
            </button>
            <button onclick="goToMercado()" class="group relative h-80 rounded-[3rem] overflow-hidden border-2 border-white/10 hover:border-purple-400 transition-all shadow-2xl hover:shadow-[0_0_50px_rgba(168,85,247,0.4)] hover:-translate-y-2">
              <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110" style="background-image: url('${MENU_MERCADO_BG}')"></div>
              <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"></div>
              <div class="absolute inset-0 flex flex-col items-center justify-center p-6">
                <div class="bg-purple-500/20 p-5 rounded-full backdrop-blur-sm border border-purple-400/30 group-hover:bg-purple-500/40 transition-colors mb-4">
                  <i data-lucide="shopping-cart" class="w-12 h-12 text-purple-300"></i>
                </div>
                <h2 class="text-4xl font-black italic uppercase tracking-tighter text-white drop-shadow-lg">MERCADO</h2>
                <p class="text-[10px] uppercase tracking-[0.3em] text-purple-300/80 mt-2 font-bold">PES 6 Database</p>
              </div>
            </button>
          </div>
        </div>
      `;
    }

    function renderMercado() {
      const s = state.marketSearch.toLowerCase();
      const filtered = PES6_MARKET_DB.filter(p => 
        p.name.toLowerCase().includes(s) || 
        p.pos.toLowerCase().includes(s) || 
        p.team.toLowerCase().includes(s) || 
        p.rating.toString().includes(s) ||
        p.clause.toLowerCase().includes(s)
      );
      const itemsPerPage = 10;
      const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
      let currentPage = state.marketPage;
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;
      const startIdx = (currentPage - 1) * itemsPerPage;
      const pageData = filtered.slice(startIdx, startIdx + itemsPerPage);
      let rowsHtml = '';
      if(pageData.length === 0) {
         rowsHtml = `<tr><td colspan="6" class="p-8 text-center text-white/40 italic">No se encontraron jugadores.</td></tr>`;
      } else {
        pageData.forEach(p => {
          rowsHtml += `
            <tr class="border-t border-white/5 hover:bg-white/5 transition-colors">
              <td class="p-4 font-bold text-cyan-300">${p.name}</td>
              <td class="p-4 font-black italic text-lg text-yellow-500">${p.rating}</td>
              <td class="p-4"><span class="bg-white/10 px-2 py-1 rounded text-xs font-bold uppercase tracking-wider">${p.pos}</span></td>
              <td class="p-4 text-white/80">${p.team}</td>
              <td class="p-4 text-green-400 font-bold">$${p.price}</td>
              <td class="p-4 text-xs ${p.clause === 'Libre' ? 'text-cyan-400 font-bold' : 'text-white/50'}">${p.clause}</td>
            </tr>
          `;
        });
      }
      return `
        ${renderHeader(true)}
        <div class="w-full flex-grow flex flex-col z-20 relative animate-scale-in pb-10">
          <div class="bg-black/70 backdrop-blur-xl border border-white/10 rounded-3xl p-6 sm:p-10 shadow-2xl flex-grow">
            <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
              <div>
                <h2 class="text-3xl font-black italic uppercase tracking-tighter flex items-center gap-3">
                  <i data-lucide="shopping-cart" class="text-purple-400"></i> MERCADO GLOBAL
                </h2>
                <p class="text-[10px] uppercase text-white/40 tracking-[0.2em] font-bold mt-1">Database PES 6</p>
              </div>
              <div class="relative w-full sm:w-72">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-white/40"></i>
                <input type="text" placeholder="Buscar jugador..." 
                       value="${state.marketSearch}" 
                       oninput="setMarketSearch(this.value)"
                       class="w-full bg-white/5 border border-white/10 rounded-full pl-10 pr-4 py-2 text-sm text-white focus:outline-none focus:border-purple-400 transition-colors" />
              </div>
            </div>
            <div class="overflow-x-auto rounded-2xl border border-white/5 bg-black/40">
              <table class="w-full text-left whitespace-nowrap">
                <thead class="bg-purple-900/20 text-[10px] uppercase tracking-widest text-purple-300 font-bold">
                   <tr>
                    <th class="p-4">Jugador</th>
                    <th class="p-4">Rating</th>
                    <th class="p-4">Pos</th>
                    <th class="p-4">Equipo</th>
                    <th class="p-4">Precio</th>
                    <th class="p-4">Cláusula</th>
                   </tr>
                </thead>
                <tbody class="text-sm">
                  ${rowsHtml}
                </tbody>
              </table>
            </div>
            <div class="flex justify-between items-center mt-6">
              <p class="text-xs text-white/40 font-bold">Mostrando ${startIdx + 1} - ${Math.min(startIdx + itemsPerPage, filtered.length)} de ${filtered.length}</p>
              <div class="flex items-center gap-4">
                <button onclick="changeMarketPage(-1)" ${currentPage === 1 ? 'disabled class="opacity-30 cursor-not-allowed"' : 'class="hover:text-purple-400 transition-colors"'}><i data-lucide="chevron-left"></i></button>
                <span class="text-sm font-bold bg-white/10 px-4 py-1 rounded-full">${currentPage} / ${totalPages}</span>
                <button onclick="changeMarketPage(1)" ${currentPage === totalPages ? 'disabled class="opacity-30 cursor-not-allowed"' : 'class="hover:text-purple-400 transition-colors"'}><i data-lucide="chevron-right"></i></button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderPacks() {
      const progressWidth = (state.inventory.length / PLAYERS_DB.length) * 100;
      const t = state.tokens;

      let albumHTML = '';
      PLAYERS_DB.forEach(p => {
        const hasPlayer = state.inventory.includes(p.id);
        const hoverClasses = hasPlayer ? 'hover:-translate-y-2 hover:scale-105 transition-transform duration-300' : '';
        let overlayHTML = '';
        if (!hasPlayer) {
          overlayHTML = `<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-cyan-500/10 pointer-events-none"><i data-lucide="lock" class="w-8 h-8" stroke-width="1"></i></div>`;
        } else {
          overlayHTML = `<div class="absolute -top-2 -right-2 z-50"><div class="bg-cyan-500 text-black rounded-full p-1 shadow-lg shadow-cyan-500/50 border-2 border-black"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i></div></div>`;
        }
        albumHTML += `
          <div class="relative group cursor-default ${hoverClasses}">
            ${getPlayerCardHTML(p, !hasPlayer, true)}
            ${overlayHTML}
          </div>
        `;
      });

      let packAreaHTML = '';
      if (!state.showReveal) {
        packAreaHTML = `
          <div class="flex flex-wrap justify-center gap-4 mb-10 w-full animate-scale-in">
            <div class="flex items-center gap-3 bg-black/60 px-5 py-2.5 rounded-full border border-white/10 backdrop-blur-md">
              <img src="${TOKEN_NORMAL_IMG}" class="w-6 h-6 object-contain">
              <span class="text-sm font-bold text-white/60">NORM:</span>
              <span class="text-lg font-black text-white">${t.normal}</span>
            </div>
            <div class="flex items-center gap-3 bg-black/60 px-5 py-2.5 rounded-full border border-purple-500/30 backdrop-blur-md">
              <img src="${TOKEN_ELITE_IMG}" class="w-6 h-6 object-contain">
              <span class="text-sm font-bold text-white/60">ELITE:</span>
              <span class="text-lg font-black text-purple-400">${t.elite}</span>
            </div>
            <div class="flex items-center gap-3 bg-black/60 px-5 py-2.5 rounded-full border border-yellow-500/30 backdrop-blur-md">
              <img src="${TOKEN_ULTIMATE_IMG}" class="w-6 h-6 object-contain">
              <span class="text-sm font-bold text-white/60">ULT:</span>
              <span class="text-lg font-black text-yellow-400">${t.ultimate}</span>
            </div>
          </div>
          <div class="flex flex-col md:flex-row justify-center items-center gap-8 lg:gap-16 w-full animate-scale-in ${state.isOpening ? 'pointer-events-none' : ''}">
            <div class="relative cursor-pointer group flex flex-col items-center" onclick="openPack('normal')">
              <div class="w-48 h-64 sm:w-56 sm:h-80 bg-cover bg-center rounded-[2rem] border-2 border-white/20 shadow-2xl flex flex-col items-center justify-center relative overflow-hidden transition-all duration-500 group-hover:border-white/50 group-hover:-translate-y-2 group-active:scale-95" style="background-image: url('${PACK_BACKGROUND}')">
                <div class="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition-colors"></div>
                <div class="relative z-10 flex flex-col items-center">
                  <img src="${TOKEN_NORMAL_IMG}" class="w-16 h-16 drop-shadow-xl mb-4 group-hover:scale-110 transition-transform" />
                  <span class="font-black italic tracking-widest uppercase text-xs text-white drop-shadow-lg bg-black/60 px-4 py-1.5 rounded-full border border-white/20">Normal</span>
                </div>
              </div>
              <p class="mt-4 text-[10px] text-white/50 uppercase tracking-widest font-bold">Costo: 1 Ficha</p>
            </div>
            <div class="relative cursor-pointer group flex flex-col items-center" onclick="openPack('elite')">
              <div class="absolute -top-4 -right-4 z-20 bg-purple-600 text-white text-[9px] font-black uppercase px-3 py-1 rounded-full border-2 border-black shadow-[0_0_15px_rgba(168,85,247,0.8)] rotate-12 group-hover:scale-110">2x Prob</div>
              <div class="w-48 h-64 sm:w-56 sm:h-80 bg-cover bg-center rounded-[2rem] border-2 border-purple-500/50 shadow-[0_0_30px_rgba(168,85,247,0.2)] flex flex-col items-center justify-center relative overflow-hidden transition-all duration-500 group-hover:border-purple-400 group-hover:shadow-[0_0_50px_rgba(168,85,247,0.5)] group-hover:-translate-y-2 group-active:scale-95" style="background-image: url('${PACK_BACKGROUND}')">
                <div class="absolute inset-0 bg-purple-900/40 group-hover:bg-purple-900/20"></div>
                <div class="relative z-10 flex flex-col items-center">
                  <img src="${TOKEN_ELITE_IMG}" class="w-16 h-16 drop-shadow-[0_0_15px_rgba(168,85,247,0.8)] mb-4 group-hover:scale-110" />
                  <span class="font-black italic tracking-widest uppercase text-xs text-white drop-shadow-lg bg-purple-900/80 px-4 py-1.5 rounded-full border border-purple-400/50">Elite</span>
                </div>
              </div>
              <p class="mt-4 text-[10px] text-purple-300/50 uppercase tracking-widest font-bold">Costo: 1 Ficha</p>
            </div>
            <div class="relative cursor-pointer group flex flex-col items-center" onclick="openPack('ultimate')">
              <div class="absolute -top-4 -right-4 z-20 bg-yellow-500 text-black text-[9px] font-black uppercase px-3 py-1 rounded-full border-2 border-black shadow-[0_0_15px_rgba(250,204,21,0.8)] rotate-12 group-hover:scale-110">+84</div>
              <div class="w-48 h-64 sm:w-56 sm:h-80 bg-cover bg-center rounded-[2rem] border-2 border-yellow-500/50 shadow-[0_0_30px_rgba(250,204,21,0.2)] flex flex-col items-center justify-center relative overflow-hidden transition-all duration-500 group-hover:border-yellow-400 group-hover:shadow-[0_0_50px_rgba(250,204,21,0.5)] group-hover:-translate-y-2 group-active:scale-95" style="background-image: url('${PACK_BACKGROUND}')">
                <div class="absolute inset-0 bg-yellow-900/40 group-hover:bg-yellow-900/20"></div>
                <div class="relative z-10 flex flex-col items-center">
                  <img src="${TOKEN_ULTIMATE_IMG}" class="w-16 h-16 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)] mb-4 group-hover:scale-110" />
                  <span class="font-black italic tracking-widest uppercase text-xs text-white drop-shadow-lg bg-yellow-900/80 px-4 py-1.5 rounded-full border border-yellow-400/50">Ultimate</span>
                </div>
              </div>
              <p class="mt-4 text-[10px] text-yellow-300/50 uppercase tracking-widest font-bold">Costo: 1 Ficha</p>
            </div>
          </div>
          ${state.isOpening ? `
            <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm animate-scale-in">
              <div class="w-64 h-96 bg-cover bg-center rounded-[2rem] animate-pack-open border-2 border-cyan-400 shadow-[0_0_100px_rgba(6,182,212,0.8)]" style="background-image: url('${PACK_BACKGROUND}')"></div>
            </div>
          ` : ''}
        `;
      } else {
        const bgBlurColor = state.revealedPlayer.rating >= 88 ? 'bg-purple-500' : 'bg-cyan-400';
        packAreaHTML = `
          <div class="flex flex-col items-center relative py-10 animate-scale-in">
            <div class="absolute w-40 h-40 rounded-full blur-[100px] pointer-events-none animate-reveal-bg ${bgBlurColor}"></div>
            ${getConfettiHTML(state.revealedPlayer.rating)}
            ${getPlayerCardHTML(state.revealedPlayer, false, false)}
            <button onclick="closeReveal()" class="mt-12 bg-white text-black px-12 py-4 font-black text-[12px] tracking-[0.3em] uppercase hover:bg-cyan-500 hover:text-white transition-all rounded-full shadow-2xl active:scale-95 animate-scale-in" style="animation-delay: 1s; opacity: 0; animation-fill-mode: forwards;">
              Añadir al Álbum
            </button>
          </div>
        `;
      }

      return `
        ${renderHeader(true)}
        <div class="flex-grow flex flex-col items-center pb-6 z-20 relative animate-scale-in w-full">
          <div class="min-h-[450px] flex flex-col items-center justify-center w-full mb-16">
            ${packAreaHTML}
          </div>
          <div class="w-full mb-10 bg-black/40 p-6 sm:p-10 rounded-[3rem] border border-white/5 backdrop-blur-xl shadow-inner">
            <div class="flex flex-col sm:flex-row justify-between items-center sm:items-end mb-10 gap-6 border-b border-white/10 pb-8">
              <div class="flex items-center gap-4">
                 <div class="p-4 bg-cyan-500/10 rounded-2xl">
                   <i data-lucide="trophy" class="text-cyan-400 w-[28px] h-[28px]"></i>
                 </div>
                 <div>
                  <h2 class="text-3xl font-black italic uppercase tracking-tighter">Mi Álbum</h2>
                  <p class="text-[10px] uppercase font-bold text-white/30 tracking-[0.2em]">Colección</p>
                 </div>
              </div>
              <div class="flex flex-col items-center sm:items-end bg-black/30 p-4 rounded-2xl border border-white/5 min-w-[150px]">
                <div class="flex items-baseline gap-1">
                  <span class="text-4xl font-black italic text-cyan-400">${state.inventory.length}</span>
                  <span class="text-white/20 font-bold">/ ${PLAYERS_DB.length}</span>
                </div>
                <div class="w-full bg-white/10 h-1.5 rounded-full mt-2 overflow-hidden">
                  <div class="h-full bg-cyan-500 shadow-[0_0_10px_rgba(6,182,212,0.8)] progress-bar" style="width: ${progressWidth}%"></div>
                </div>
              </div>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-y-12 gap-x-4 place-items-center">
              ${albumHTML}
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      const root = document.getElementById('root');
      if (state.view === 'login') root.innerHTML = renderLogin();
      else if (state.view === 'admin') renderAdmin();
      else if (state.view === 'menu') root.innerHTML = renderMenu();
      else if (state.view === 'mercado') root.innerHTML = renderMercado();
      else if (state.view === 'packs') root.innerHTML = renderPacks();
      
      if (typeof lucide !== 'undefined' && lucide.createIcons) {
        lucide.createIcons();
      }
    }

    syncUserData();
    render();
  </script>
</body>
</html>
